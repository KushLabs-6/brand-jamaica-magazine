name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass brandjamaica -keypass brandjamaica -dname "CN=Brand Jamaica, OU=Magazine, O=KushLabs, L=Kingston, S=Kingston, C=JM"

      - name: Build Android App (Docker Sandbox)
        run: |
          chmod -R 777 ${{ github.workspace }}
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD=brandjamaica \
            -e BUBBLEWRAP_KEY_PASSWORD=brandjamaica \
            ghcr.io/googlechromelabs/bubblewrap:latest build --yes --universalApk

      - name: Hard Discovery & Rename
        run: |
          echo "Searching for APKs..."
          find . -name "*.apk" -exec mv {} ./Brand-Jamaica-Magazine.apk \;
          find . -name "*.aab" -exec mv {} ./Brand-Jamaica-Magazine.aab \;
          
          # Force a failure if not found to catch silent errors
          ls -l Brand-Jamaica-Magazine.apk || exit 1

      - name: Upload APK directly to Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Brand-Jamaica-Android-App
          path: |
            Brand-Jamaica-Magazine.apk
            Brand-Jamaica-Magazine.aab
          retention-days: 5
