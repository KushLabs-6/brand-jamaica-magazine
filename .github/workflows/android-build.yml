name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android App (PWA to APK)
        id: pwa-to-apk
        uses: flaycks/pwa-to-apk@v1.0.1
        with:
          # Basic App Info
          package-id: 'com.brandjamaica.magazine'
          app-name: 'Brand Jamaica Magazine'
          url: 'https://kushlabs-6.github.io/brand-jamaica-magazine/'
          
          # Colors
          theme-color: '#009b3a'
          background-color: '#fcebd0'
          
          # Signing (This action auto-generates keys if not provided)
          # We'll use the default signing for this initial APK

      - name: Log SHA256 Fingerprint
        run: |
          echo "SHA256 Fingerprint for assetlinks.json:"
          echo "${{ steps.pwa-to-apk.outputs.sha256-fingerprint }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Brand-Jamaica-Android-APK
          path: ./*.apk
