name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass brandjamaica -keypass brandjamaica -dname "CN=Brand Jamaica, OU=Magazine, O=KushLabs, L=Kingston, S=Kingston, C=JM"

      - name: Build Android App (Docker Sandbox)
        run: |
          # Make sure directory is fully accessible to the docker container volume mapping
          chmod -R 777 ${{ github.workspace }}
          
          # Run the official Google Chrome Labs bubblewrap container to build the package
          docker run --rm -v ${{ github.workspace }}:/app -w /app ghcr.io/googlechromelabs/bubblewrap:latest build --yes --universalApk

      - name: Hard Discovery & Rename
        run: |
          echo "Searching for APKs..."
          find . -name "*.apk" -exec mv {} ./Brand-Jamaica-Magazine.apk \;
          find . -name "*.aab" -exec mv {} ./Brand-Jamaica-Magazine.aab \;
          
          # Verify found
          ls -l Brand-Jamaica-Magazine.apk || echo "APK NOT FOUND"

      - name: Final Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Brand Jamaica Magazine v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            Brand-Jamaica-Magazine.apk
            Brand-Jamaica-Magazine.aab
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
