name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Generate Signing Key
        run: |
          # Generate a signing key non-interactively
          keytool -genkey -v -keystore android.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass brandjamaica -keypass brandjamaica -dname "CN=Brand Jamaica, OU=Magazine, O=KushLabs, L=Kingston, S=Kingston, C=JM"

      - name: Build Android App
        run: |
          # Initialize and build using the committed twa-manifest.json
          # We use --yes to skip all prompts
          bubblewrap build --yes --universalApk

      - name: Log SHA256 Fingerprint
        run: |
          # Extract and log the SHA256 fingerprint for assetlinks.json
          keytool -list -v -keystore android.keystore -alias key0 -storepass brandjamaica | grep SHA256

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Brand-Jamaica-Android-APK
          path: ./*.apk
