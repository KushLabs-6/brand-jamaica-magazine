name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass brandjamaica -keypass brandjamaica -dname "CN=Brand Jamaica, OU=Magazine, O=KushLabs, L=Kingston, S=Kingston, C=JM"

      - name: Build Android App (Docker Sandbox)
        run: |
          chmod -R 777 ${{ github.workspace }}
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD=brandjamaica \
            -e BUBBLEWRAP_KEY_PASSWORD=brandjamaica \
            ghcr.io/googlechromelabs/bubblewrap:latest build --yes --universalApk > debug_build.log 2>&1 || true
          
          ls -laR > debug_files.log

      - name: Hard Discovery & Rename
        run: |
          find . -name "*.apk" -exec cp {} ./Brand-Jamaica-Magazine.apk \; || true
          find . -name "*.aab" -exec cp {} ./Brand-Jamaica-Magazine.aab \; || true

      - name: Upload Debug Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-Logs-and-Outputs
          path: |
            debug_*.log
            Brand-*.apk
            Brand-*.aab
          retention-days: 5
