name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass brandjamaica -keypass brandjamaica -dname "CN=Brand Jamaica, OU=Magazine, O=KushLabs, L=Kingston, S=Kingston, C=JM"

      - name: Build Android App (Docker Sandbox)
        run: |
          chmod -R 777 ${{ github.workspace }}
          # Use "yes |" to automatically accept the Android SDK licenses and project regeneration prompts
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD=brandjamaica \
            -e BUBBLEWRAP_KEY_PASSWORD=brandjamaica \
            ghcr.io/googlechromelabs/bubblewrap:latest sh -c "yes | bubblewrap build --universalApk" > debug_build_docker.log 2>&1 || true
          
          ls -laR > debug_files_docker.log

      - name: Hard Discovery & Rename
        run: |
          find . -name "*.apk" -exec mv {} ./Brand-Jamaica-Magazine.apk \; || true
          find . -name "*.aab" -exec mv {} ./Brand-Jamaica-Magazine.aab \; || true

      - name: Final Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Brand Jamaica Magazine v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            Brand-Jamaica-Magazine.apk
            Brand-Jamaica-Magazine.aab
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug Artifacts (If Failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Debug-Logs-and-Outputs
          path: |
            debug_*.log
          retention-days: 5
