name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Android App (PWA to APK)
        uses: sharadcodes/pwa-to-apk-action@v2
        with:
          pwasite: "https://kushlabs-6.github.io/brand-jamaica-magazine/"
          id: "com.brandjamaica.magazine"
          name: "Brand Jamaica Magazine"
          # This action handles keys internally; we'll get the fingerprint from logs

      - name: Hard Discovery & Rename
        run: |
          # The action usually outputs to specific folders, but we'll find it recursively
          echo "Searching for APKs..."
          find . -name "*.apk" -exec cp {} ./Brand-Jamaica-Magazine.apk \;
          find . -name "*.aab" -exec cp {} ./Brand-Jamaica-Magazine.aab \;
          
          # Print if found
          ls -l Brand-Jamaica-Magazine.apk || echo "APK NOT FOUND"

      - name: Final Discovery & Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Brand Jamaica Magazine v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            Brand-Jamaica-Magazine.apk
            Brand-Jamaica-Magazine.aab
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
