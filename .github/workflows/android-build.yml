name: Build Android APK (TWA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (for keytool)
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000 -storepass brandjamaica -keypass brandjamaica -dname "CN=Brand Jamaica, OU=Magazine, O=KushLabs, L=Kingston, S=Kingston, C=JM"

      - name: Build Android App (Docker Sandbox)
        run: |
          chmod -R 777 ${{ github.workspace }}
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD=brandjamaica \
            -e BUBBLEWRAP_KEY_PASSWORD=brandjamaica \
            ghcr.io/googlechromelabs/bubblewrap:latest build --yes --universalApk > debug_build_docker.log 2>&1 || true
          
          ls -laR > debug_files_docker.log

      - name: Commit Logs to Repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add debug_build_docker.log debug_files_docker.log
          git commit -m "Upload Docker Bubblewrap Logs"
          git push
